<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Map 3.0</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        h1 { margin: 0; font-size: 2rem; }
        p { margin: 10px 0 0; opacity: 0.9; }
        .data-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        pre { 
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Economy Map 3.0</h1>
        <p>Global Environmental Footprinting & Supply Chain Analysis</p>
        <p>Automated daily updates via GitHub Actions</p>
    </header>

    <div class="data-box">
        <h2>Latest Data</h2>
        <pre id="data">Loading...</pre>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('data').textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById('data').textContent = 'Error loading data: ' + error;
            });
    </script>
</body>
</html>
